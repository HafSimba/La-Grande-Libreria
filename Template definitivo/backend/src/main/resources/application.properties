spring.application.name=backend

# COME PERSONALIZZARE DATABASE:
# - Imposta le variabili d ambiente SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD.
# - Se non imposti variabili, Spring usa i valori di fallback qui sotto.
# - Se usi un DB diverso, cambia driver/dependency nel pom.xml.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/esame?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}

# COME PERSONALIZZARE JPA:
# - update: aggiorna schema senza cancellare dati.
# - create-drop: utile solo in sviluppo rapido.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
