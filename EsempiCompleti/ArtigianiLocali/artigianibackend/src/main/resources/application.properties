spring.application.name=artigianibackend
# Porta backend: aggiornala se devi evitare conflitti con altri servizi locali.
server.port=8080

# H2 in-memory in compatibilita MySQL per sviluppo rapido.
# Se passi a MySQL reale, sostituisci URL/driver/username/password.
spring.datasource.url=jdbc:h2:mem:artigianidb;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# update e comodo in sviluppo; in produzione valuta validate o none + migration tool.
spring.jpa.hibernate.ddl-auto=update
# Log SQL utili in debug e demo didattica.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 utile per verificare dati inseriti dal frontend.
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Endpoint della UI OpenAPI/Swagger.
springdoc.swagger-ui.path=/swagger-ui.html
